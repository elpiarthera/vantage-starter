name: E2E Tests

on:
  deployment_status:

# Remote-browser path (Browserbase) is intentionally NOT wired into CI.
# This is a budget decision, not breakage: the service is banned fleet-wide
# for now and the human is the visual verifier. CI runs entirely on the
# local Chromium installed by the "Install Playwright browsers" step below —
# that is the nominal, tested path (see e2e/fixtures.ts header comment).
# To re-enable the remote path when budget allows, re-add:
#   env:
#     BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
#     BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
#     BB_CONTEXT_ID: ${{ secrets.BB_CONTEXT_ID }}
jobs:
  e2e:
    if: >-
      github.event.deployment_status.state == 'success' &&
      contains(github.event.deployment_status.environment, 'Preview')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # This job never installed its own browser binary — Playwright's Chromium
      # is not part of the base runner image, so a missing binary here reads as
      # a product defect ("tests fail") when it is actually a missing instrument.
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
        run: pnpm exec playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
