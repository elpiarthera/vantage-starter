name: quality

# Why this file exists
# --------------------
# Until now this repo had exactly one workflow (e2e.yml) and no lint, typecheck
# or build gate of any kind. That is how four defects shipped together and lived
# for weeks: an undeclared dependency that made the Convex backend impossible to
# deploy, five TypeScript errors nobody ran, a half-finished Tailwind v4
# migration that broke the dashboard layout, and a `|| true` that swallowed the
# prebuild's exit code while Vercel reported Ready. None of them ever turned
# anything red.
#
# Every gate below is proven green on the commit that introduces it. A gate that
# is red on day one gets disabled by the end of the week and protects nothing.
# Gates that are NOT here yet are declared at the bottom of this file rather than
# quietly omitted.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Tailwind v4 dropped the bare `[--var]` form: it compiles to the invalid
      # declaration `width: --sidebar-width`, which the browser discards without
      # a word. That silence shipped a dashboard whose sidebar spacer collapsed,
      # so every page rendered underneath the fixed sidebar ("Mission Control"
      # displayed as "trol"). A one-off grep only proves today; this proves every
      # commit.
      # Comment lines are skipped on purpose. The first version of this gate
      # rejected the very comment in sidebar.tsx that warns about this bug,
      # because the warning quotes the broken form to explain it. A guard that
      # scans prose is either too lax or too zealous, and the zealous one gets
      # deleted. This one reads code. The trade-off is declared: a bare variable
      # sitting in a trailing comment on a line of real code would slip through —
      # harmless, since Tailwind does not read comments either.
      # Three outcomes, never two. "I could not measure" must never render the
      # same screen as "it is clean" — that equivalence is the entire disease
      # this PR exists to fix, and the first version of this gate had it: strip a
      # scanned directory and grep only warned on stderr while the step still
      # exited 0, handing out a clean certificate having scanned nothing. A
      # missing directory is an EVENT, not a rest.
      #   exit 0 — scanned everything, found nothing
      #   exit 1 — found a violation
      #   exit 2 — could not scan; names what it could not read
      - name: No bare CSS variables in Tailwind brackets
        run: |
          roots="app components lib hooks providers src styles"
          missing=""
          for d in $roots; do
            [ -d "$d" ] || missing="$missing $d"
          done
          if [ -n "$missing" ]; then
            echo "::error::Gate cannot measure — directory not found:$missing. Refusing to report clean on unscanned ground. If a directory was intentionally removed or renamed, update the roots list in this workflow."
            exit 2
          fi
          hits=$(grep -rnE '\[--[A-Za-z0-9_-]+\]' \
                   --include='*.ts' --include='*.tsx' --include='*.jsx' --include='*.css' \
                   $roots \
                 | grep -vE '^[^:]+:[0-9]+:[[:space:]]*(\*|//|/\*)' || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::Bare CSS variable in a Tailwind bracket. Tailwind v4 compiles [--x] to the invalid 'width: --x' and silently drops it. Use the explicit [var(--x)] form."
            exit 1
          fi
          echo "OK — scanned$( for d in $roots; do printf ' %s' "$d"; done ) — no bare CSS variables in code."

      # A literal hex inside a Tailwind bracket (`bg-[#0d7ff2]`) is a colour that
      # cannot follow the theme: it renders identically in dark and light, so the
      # screen ships a single variant. That is what `vantage-design-system` §3
      # forbids — "Every new screen ships both a dark and a light variant.
      # Neither is optional." It shipped anyway: the error boundary
      # (`bg-[#101a23]`), the adaptive nav (`bg-[#223649]`) and both auth screens
      # carried zero `dark:` between them.
      # This gate is green on the commit that introduces it — the whole class is
      # at zero repo-wide right now, so it guards a regression rather than
      # announcing a debt. Scope is deliberately narrow for that reason: see the
      # declared-absent list at the bottom for the bare `bg-gray-*` family, which
      # cannot be gated today without arriving red.
      # Three outcomes, never two — same rule as the gate above.
      - name: No literal hex colours in Tailwind brackets
        run: |
          roots="app components lib hooks providers"
          missing=""
          for d in $roots; do
            [ -d "$d" ] || missing="$missing $d"
          done
          if [ -n "$missing" ]; then
            echo "::error::Gate cannot measure — directory not found:$missing. Refusing to report clean on unscanned ground."
            exit 2
          fi
          hits=$(grep -rnE '\b(bg|text|border|fill|stroke|ring|shadow|from|to|via)-\[#[0-9a-fA-F]{3,8}\]' \
                   --include='*.ts' --include='*.tsx' --include='*.jsx' \
                   $roots \
                 | grep -vE '^(lib/design-system|lib/create)/' \
                 | grep -vE '^[^:]+:[0-9]+:[[:space:]]*(\*|//|/\*)' || true)
          if [ -n "$hits" ]; then
            echo "$hits"
            echo "::error::Literal hex colour in a Tailwind bracket. It cannot follow the theme, so the screen ships one variant only — vantage-design-system §3. Use a semantic token (bg-background, bg-card, bg-primary, border-border, text-muted-foreground)."
            exit 1
          fi
          echo "OK — scanned$( for d in $roots; do printf ' %s' "$d"; done ) — no literal hex colours in Tailwind brackets."

      # Proves the prebuild still resolves its dependencies. `esbuild` was
      # imported by scripts/build-litui.mjs and declared nowhere; `|| true` hid
      # the resulting failure on every single deployment.
      - name: Prebuild fails closed
        run: pnpm prebuild

      # The lit-ui bundle is a build artifact and must not be committed. If this
      # step finds a diff, someone re-tracked it and every build will now dirty
      # the working tree.
      - name: Build artifacts stay out of git
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::prebuild dirtied the working tree — a generated artifact is tracked in git:"
            git status --porcelain
            exit 1
          fi
          echo "OK — prebuild leaves the tree clean."

      # Three controls, all derived from the artifacts they measure: hardcoded
      # English literals across the whole app/+components/ surface (not a
      # hand-picked subset of directories), key parity across every locale in
      # i18n/routing.ts (not an en/fr-only check — that shape is exactly what
      # let the `chat` namespace ship in only 2 of 7 locales for weeks), and
      # fr values byte-identical to en (forgotten translation / copy-paste).
      # See scripts/check-translations.js for the full contract and README.md
      # "Translation QA" for usage. Intentionally NOT gated with `|| true`:
      # a permanent QA script that never turns red protects nothing.
      - name: Translation QA — check-translations
        run: node scripts/check-translations.js

# Gates deliberately NOT here yet — declared, not hidden
# -----------------------------------------------------
# Each is a tracked root-fix, not a "later". Adding them today would make this
# workflow red on arrival and get the whole file disabled.
#
# 1. biome — `npx biome check .` currently reports 56 pre-existing problems
#    across app/, lib/, convex/, src/, hooks/, scripts/ and the test suites.
#    Blocked on cleaning those; the fix is mechanical (most are FIXABLE).
#
# 2. tsc --noEmit — currently 16 pre-existing errors: missing `vite/client`
#    types across __tests__/convex/*, `vitest.config.ts` missing `vite`, and
#    `useOptimistic` in components/chat/ModelSelector.tsx. Until these are
#    resolved, TypeScript is not a usable gate in this repo.
#
# 3. convex typecheck + codegen freshness — `convex/_generated` is committed, and
#    `npx convex codegen` needs a Convex access token to reach the API. The build
#    environment deliberately has none: a preview must never touch the shared dev
#    backend. Verifying that `_generated` is in sync therefore needs a job with
#    credentials, which does not exist yet. This is precisely how five TS18047
#    errors reached main.
#
# 4. undeclared imports — nothing checks that an imported package is declared in
#    package.json. `@ai-sdk/gateway` (4 importers) and `esbuild` both were not,
#    which is the root of this whole batch. A depcheck/knip gate closes the class.
#
# 5. bare `bg-gray-*` / `text-gray-*` / `border-gray-*` Tailwind colour classes —
#    `vantage-design-system` §3 prefers semantic tokens, and the hex-bracket gate
#    above only closes the sibling class. 71 legitimate occurrences remain today:
#    each carries a `dark:` counterpart, renders correctly in both themes, and is
#    a token-preference violation rather than a rendering bug. Gating them now
#    would make this workflow red on arrival — and a gate that is red on day one
#    gets disabled by the end of the week, taking the four working gates with it.
#    Tracked in docs/audits/t0bis-hardcoded-colors.md (severity NORM), which lists
#    every occurrence file:line. Declared here rather than silently omitted.
